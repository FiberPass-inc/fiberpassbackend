name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGODB_URI: mongodb://127.0.0.1:27018/fiberpass_ci?replicaSet=rs0&directConnection=true
      CHARGE_RESERVATION_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      LIFECYCLE_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      WORKER_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      PLATFORM_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      IDENTITY_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      FUNDING_TEST_MONGODB_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
      WEBHOOK_SECRET_ENCRYPTION_KEY: 1111111111111111111111111111111111111111111111111111111111111111
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start Mongo replica set
        run: |
          docker run -d --name fiberpass-ci-mongo -p 27018:27017 mongo:7 --replSet rs0 --bind_ip_all
          for attempt in {1..30}; do
            docker exec fiberpass-ci-mongo mongosh --quiet --eval 'db.runCommand({ping:1}).ok' && break
            sleep 1
          done
          docker exec fiberpass-ci-mongo mongosh --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]})'
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run migrate
      - run: npm run test:charge-reservations
      - run: npm run test:lifecycle-transactions
      - run: npm run test:workers
      - run: npm run test:platform
      - run: npm run test:identity
      - run: npm run test:funding

  vault-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: rustup target add riscv64imac-unknown-none-elf
      - run: npm run vault:build
